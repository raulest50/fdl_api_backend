services:
  questdb:
    image: ${QUESTDB_IMAGE:-questdb/questdb:9.3.5}
    container_name: questdb
    restart: unless-stopped
    init: true
    environment:
      QDB_HTTP_USER: ${QDB_HTTP_USER:-}
      QDB_HTTP_PASSWORD: ${QDB_HTTP_PASSWORD:-}
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "127.0.0.1:${QUESTDB_HTTP_PORT:-9000}:9000"
      - "127.0.0.1:${QUESTDB_PG_PORT:-8812}:8812"
    volumes:
      - "${QUESTDB_DATA_DIR:-/srv/questdb-data/data}:/var/lib/questdb"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    cpus: "0.50"
    mem_limit: "768m"
    memswap_limit: "768m"
    pids_limit: 256

  frontera-data-labs-api:
    build: .
    container_name: frontera-data-labs-api
    restart: unless-stopped
    init: true
    depends_on:
      - questdb
    environment:
      APP_NAME: ${APP_NAME:-Frontera Data Labs API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      QUESTDB_BASE_URL: ${QUESTDB_BASE_URL:-http://questdb:9000}
      QDB_HTTP_USER: ${QDB_HTTP_USER:-}
      QDB_HTTP_PASSWORD: ${QDB_HTTP_PASSWORD:-}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-https://dashboard.fronteradatalabs.com,https://fronteradatalabs.com,https://www.fronteradatalabs.com}
      QUERY_TIMEOUT_SECONDS: ${QUERY_TIMEOUT_SECONDS:-10}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:${API_PORT:-8000}"
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "2"
    cpus: "0.25"
    mem_limit: "256m"
    memswap_limit: "256m"
    pids_limit: 128
