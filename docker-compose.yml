services:
  frontera-data-labs-api:
    build: .
    container_name: frontera-data-labs-api
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --log-level error --no-access-log"
    ports:
      - "127.0.0.1:${API_PORT:-8000}:${API_PORT:-8000}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
